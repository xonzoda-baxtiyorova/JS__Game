<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Rock-Paper_scissors</title>
</head>
<body>
    <div class="content">
        <h2 class="content__title">
            Rock Paper Scissors
        </h2>

        <div class="wrapper">
            <div class="wrapper__element">
            <img class="first_player" src="./img/🖐️.jpg" alt="">
            <span class="player">1-player</span>
        </div>

        <div class="wrapper__element">
            <img class="second_player" src="./img/🖐️.jpg" alt="">
            <span class="player">2-player</span>
        </div>
        </div>

        <button class="btn">start</button>
        <p class="result">You won!</p>
    </div>

    <script src="./app.js"></script>
</body>
</html>
